name: Set up Tauri Linux dependencies
description: Install the native libraries required to compile the Tauri Desktop workspace member
runs:
  using: composite
  steps:
    - name: Install native packages
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf \
          xdg-utils
