name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.5.3

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve and validate version
        id: version
        run: |
          manifest_version=$(cargo run -p xtask --locked -- workspace-version)
          tag="${{ github.event.release.tag_name }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "release tag $tag must use vX.Y.Z semver format" >&2
            exit 1
          fi
          version="${tag#v}"
          if [[ "$manifest_version" != "$version" ]]; then
            echo "workspace version $manifest_version does not match release version $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Run release validation
        run: make ci

      - name: Run CLI release smoke
        run: make cli-smoke

  build-binaries:
    name: Build ${{ matrix.name }} binary
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: cli-x86_64-unknown-linux-gnu
            package: starweaver-cli
            target: x86_64-unknown-linux-gnu
            archive: starweaver-cli-${{ needs.validate.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz
            bins: "starweaver starweaver-cli sw"
          - os: macos-latest
            name: cli-x86_64-apple-darwin
            package: starweaver-cli
            target: x86_64-apple-darwin
            archive: starweaver-cli-${{ needs.validate.outputs.tag }}-x86_64-apple-darwin.tar.gz
            bins: "starweaver starweaver-cli sw"
          - os: macos-latest
            name: cli-aarch64-apple-darwin
            package: starweaver-cli
            target: aarch64-apple-darwin
            archive: starweaver-cli-${{ needs.validate.outputs.tag }}-aarch64-apple-darwin.tar.gz
            bins: "starweaver starweaver-cli sw"
          - os: windows-latest
            name: cli-x86_64-pc-windows-msvc
            package: starweaver-cli
            target: x86_64-pc-windows-msvc
            archive: starweaver-cli-${{ needs.validate.outputs.tag }}-x86_64-pc-windows-msvc.zip
            bins: "starweaver.exe starweaver-cli.exe sw.exe"
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: |
          cargo build --release --locked -p "${{ matrix.package }}" --bins --target "${{ matrix.target }}"
          out_dir="target/${{ matrix.target }}/release"
          mkdir -p dist
          for bin in ${{ matrix.bins }}; do
            cp "$out_dir/$bin" dist/
          done

      - name: Archive Unix binaries
        if: runner.os != 'Windows'
        run: tar -czf "${{ matrix.archive }}" -C dist .

      - name: Archive Windows binaries
        if: runner.os == 'Windows'
        run: powershell -NoProfile -Command "Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  upload-assets:
    name: Upload release assets
    needs: [validate, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > checksums.txt
          else
            shasum -a 256 * > checksums.txt
          fi

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.validate.outputs.tag }}" dist/* --clobber

  publish-crates:
    name: Publish crates
    needs: [validate, upload-assets]
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Dry-run publish root crate
        run: make publish-dry-run

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: make publish
