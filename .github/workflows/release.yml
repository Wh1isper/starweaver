name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-binaries:
    name: Build ${{ matrix.name }} binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: cli-x86_64-unknown-linux-gnu
            package: starweaver-cli
            target: x86_64-unknown-linux-gnu
            archive: starweaver-cli-${{ github.event.release.tag_name }}-x86_64-unknown-linux-gnu.tar.gz
            bins: "starweaver starweaver-cli sw starweaver-rpc"
          - os: macos-latest
            name: cli-x86_64-apple-darwin
            package: starweaver-cli
            target: x86_64-apple-darwin
            archive: starweaver-cli-${{ github.event.release.tag_name }}-x86_64-apple-darwin.tar.gz
            bins: "starweaver starweaver-cli sw starweaver-rpc"
          - os: macos-latest
            name: cli-aarch64-apple-darwin
            package: starweaver-cli
            target: aarch64-apple-darwin
            archive: starweaver-cli-${{ github.event.release.tag_name }}-aarch64-apple-darwin.tar.gz
            bins: "starweaver starweaver-cli sw starweaver-rpc"
          - os: windows-latest
            name: cli-x86_64-pc-windows-msvc
            package: starweaver-cli
            target: x86_64-pc-windows-msvc
            archive: starweaver-cli-${{ github.event.release.tag_name }}-x86_64-pc-windows-msvc.zip
            bins: "starweaver.exe starweaver-cli.exe sw.exe starweaver-rpc.exe"
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: |
          cargo build --release --locked -p "${{ matrix.package }}" --bins --target "${{ matrix.target }}"
          cargo build --release --locked -p starweaver-rpc --bins --target "${{ matrix.target }}"
          out_dir="target/${{ matrix.target }}/release"
          mkdir -p dist
          for bin in ${{ matrix.bins }}; do
            cp "$out_dir/$bin" dist/
          done

      - name: Archive Unix binaries
        if: runner.os != 'Windows'
        run: tar -czf "${{ matrix.archive }}" -C dist .

      - name: Archive Windows binaries
        if: runner.os == 'Windows'
        run: powershell -NoProfile -Command "Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  build-python-sdist:
    name: Build Python source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Check Python lock file
        run: uv lock --locked

      - name: Verify Python package version
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          python - <<'PY' "$version"
          import sys
          import tomllib
          from pathlib import Path

          expected = sys.argv[1]
          pyproject = tomllib.loads(Path("packages/starweaver-py/pyproject.toml").read_text())
          actual = pyproject["project"]["version"]
          if actual != expected:
              raise SystemExit(f"Python package version mismatch: expected {expected}, got {actual}")
          PY

      - name: Build Python source distribution
        run: uv build --package starweaver --sdist -o dist/python

      - name: Upload Python sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/python/*
          if-no-files-found: error

  build-python-wheels:
    name: Build Python wheel (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
            args: --manifest-path packages/starweaver-py/Cargo.toml --release --locked --out dist/python --interpreter python3.11 python3.12 python3.13 --compatibility pypi
          - os: macos-latest
            name: macos-x86_64
            target: x86_64-apple-darwin
            manylinux: auto
            args: --manifest-path packages/starweaver-py/Cargo.toml --release --locked --out dist/python --find-interpreter --compatibility pypi
          - os: macos-latest
            name: macos-aarch64
            target: aarch64-apple-darwin
            manylinux: auto
            args: --manifest-path packages/starweaver-py/Cargo.toml --release --locked --out dist/python --find-interpreter --compatibility pypi
          - os: windows-latest
            name: windows-x64
            target: x86_64-pc-windows-msvc
            manylinux: auto
            args: --manifest-path packages/starweaver-py/Cargo.toml --release --locked --out dist/python --find-interpreter --compatibility pypi
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust toolchain
        if: runner.os != 'Linux'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python
        if: runner.os != 'Linux'
        uses: actions/setup-python@v6
        with:
          python-version: |
            3.11
            3.12
            3.13

      - name: Build Python wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: v1.11.5
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: ${{ matrix.args }}
          sccache: "true"

      - name: Upload Python wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.name }}
          path: dist/python/*
          if-no-files-found: error

  upload-assets:
    name: Upload release assets
    needs: [build-binaries, build-python-sdist, build-python-wheels]
    runs-on: ubuntu-latest
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > checksums.txt
          else
            shasum -a 256 * > checksums.txt
          fi

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber --repo "${{ github.repository }}"

  publish-crates:
    name: Publish crates
    needs: upload-assets
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: make publish

  publish-python:
    name: Publish Python package
    needs: upload-assets
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist/python
          merge-multiple: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Publish Python package
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish --check-url https://pypi.org/simple/starweaver/ dist/python/*
