name: Draft Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: draft-release-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  resolve:
    name: Resolve release version
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve version from release branch
        id: version
        run: |
          branch="${{ github.event.pull_request.head.ref }}"
          version="${branch#release/v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "release branch $branch must use release/vX.Y.Z semver format" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate release commit
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout merged release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate workspace version
        run: |
          manifest_version=$(cargo run -p xtask --locked -- workspace-version)
          if [[ "$manifest_version" != "${{ needs.resolve.outputs.version }}" ]]; then
            echo "workspace version $manifest_version does not match release version ${{ needs.resolve.outputs.version }}" >&2
            exit 1
          fi

      - name: Run release validation
        run: make ci-all

      - name: Export release commit
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-binaries:
    name: Build ${{ matrix.name }} binary
    needs: [resolve, validate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu
            archive: starweaver-cli-${{ needs.resolve.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz
            bin: starweaver-cli
          - os: macos-latest
            name: x86_64-apple-darwin
            target: x86_64-apple-darwin
            archive: starweaver-cli-${{ needs.resolve.outputs.tag }}-x86_64-apple-darwin.tar.gz
            bin: starweaver-cli
          - os: macos-latest
            name: aarch64-apple-darwin
            target: aarch64-apple-darwin
            archive: starweaver-cli-${{ needs.resolve.outputs.tag }}-aarch64-apple-darwin.tar.gz
            bin: starweaver-cli
          - os: windows-latest
            name: x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
            archive: starweaver-cli-${{ needs.resolve.outputs.tag }}-x86_64-pc-windows-msvc.zip
            bin: starweaver-cli.exe
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: |
          cargo build --release --locked -p starweaver-cli --bin starweaver-cli --target "${{ matrix.target }}"
          out_dir="target/${{ matrix.target }}/release"
          mkdir -p dist
          cp "$out_dir/${{ matrix.bin }}" dist/

      - name: Archive Unix binary
        if: runner.os != 'Windows'
        run: tar -czf "${{ matrix.archive }}" -C dist "${{ matrix.bin }}"

      - name: Archive Windows binary
        if: runner.os == 'Windows'
        run: powershell -NoProfile -Command "Compress-Archive -Path dist/${{ matrix.bin }} -DestinationPath ${{ matrix.archive }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  create-draft-release:
    name: Create draft release
    needs: [resolve, validate, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ needs.resolve.outputs.tag }}" --yes --cleanup-tag || true
          gh release create "${{ needs.resolve.outputs.tag }}" \
            --draft \
            --target "${{ needs.validate.outputs.sha }}" \
            --title "Starweaver ${{ needs.resolve.outputs.tag }}" \
            --generate-notes \
            dist/*
