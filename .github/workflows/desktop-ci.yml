name: Desktop CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Desktop frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frontend
        run: pnpm desktop:check

  boundaries:
    name: Desktop boundaries and target registry
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate Desktop boundaries
        run: make desktop-boundaries-check

  native:
    name: Desktop native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            run_tests: true
          - os: macos-latest
            target: x86_64-apple-darwin
            run_tests: false
          - os: macos-latest
            target: aarch64-apple-darwin
            run_tests: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            run_tests: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-tauri-linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: desktop-${{ matrix.target }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run native unit tests
        if: matrix.run_tests
        run: cargo test -p starweaver-desktop --all-targets --locked

      - name: Build native shell without bundling
        run: pnpm --filter @starweaver/desktop tauri build --ci --no-bundle --target ${{ matrix.target }}

      - name: Smoke test macOS single-instance activation
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: apps/starweaver-desktop/scripts/smoke-single-instance-macos.sh target/${{ matrix.target }}/release/starweaver-desktop
