name: Claw Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.starweaver-claw"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - "crates/**"
      - ".github/workflows/claw-image.yml"
  pull_request:
    paths:
      - "Dockerfile.starweaver-claw"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - "crates/**"
      - ".github/workflows/claw-image.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: claw-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate Claw image
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Claw image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.starweaver-claw
          push: false
          load: false
          tags: starweaver-claw:pr
          build-args: |
            YA_CLAW_SERVICE_VERSION=pr-${{ github.event.pull_request.number || github.run_number }}
            YA_CLAW_SERVICE_COMMIT=${{ github.sha }}
            YA_CLAW_SERVICE_BUILD=pr-${{ github.run_number }}-${{ github.run_attempt }}
            YA_CLAW_SERVICE_IMAGE=starweaver-claw:pr
          cache-from: type=gha,scope=starweaver-claw
          cache-to: type=gha,mode=max,scope=starweaver-claw

  publish-dev:
    name: Publish Claw dev image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/starweaver-claw" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=dev
          labels: |
            org.opencontainers.image.title=starweaver-claw
            org.opencontainers.image.description=Single-node Starweaver Claw service with embedded web console

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.starweaver-claw
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            YA_CLAW_SERVICE_VERSION=dev
            YA_CLAW_SERVICE_COMMIT=${{ github.sha }}
            YA_CLAW_SERVICE_BUILD=dev-${{ github.run_number }}-${{ github.run_attempt }}
            YA_CLAW_SERVICE_IMAGE=${{ steps.prep.outputs.image }}:dev
          cache-from: type=gha,scope=starweaver-claw
          cache-to: type=gha,mode=max,scope=starweaver-claw

  publish-release:
    name: Publish Claw release image
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Prepare image name
        id: prep
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/starweaver-claw" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=starweaver-claw
            org.opencontainers.image.description=Single-node Starweaver Claw service with embedded web console

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.starweaver-claw
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            YA_CLAW_SERVICE_VERSION=${{ github.event.release.tag_name }}
            YA_CLAW_SERVICE_COMMIT=${{ github.sha }}
            YA_CLAW_SERVICE_BUILD=release-${{ github.run_number }}-${{ github.run_attempt }}
            YA_CLAW_SERVICE_IMAGE=${{ steps.prep.outputs.image }}:${{ github.event.release.tag_name }}
          cache-from: type=gha,scope=starweaver-claw
          cache-to: type=gha,mode=max,scope=starweaver-claw
