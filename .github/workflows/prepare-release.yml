name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to prepare, for example 0.0.1"
        required: true

permissions:
  contents: write

concurrency:
  group: prepare-release-${{ github.event.inputs.version }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Prepare release branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Desktop Linux dependencies
        uses: ./.github/actions/setup-tauri-linux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.5.3

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Rust API compatibility checker
        run: cargo install cargo-semver-checks --version 0.48.0 --locked

      - name: Validate requested version
        run: |
          version="${{ github.event.inputs.version }}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "version $version must use X.Y.Z semver format" >&2
            exit 1
          fi

      - name: Upversion workspace
        run: make upversion VERSION=${{ github.event.inputs.version }}

      - name: Run release preparation checks
        run: |
          make fmt-check
          make rpc-idl-check
          make rpc-ci-check
          make rpc-independent-client-check
          make desktop-boundaries-check
          make py-check
          make release-api-check
          make docs-build
          make publish-dry-run

      - name: Push release branch
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          branch="release/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add -A
          if git diff --cached --quiet; then
            echo "No release version changes were produced for ${VERSION}." >&2
            exit 1
          fi
          git commit -m "Prepare release v${VERSION}"
          git push --force-with-lease origin "$branch"
          {
            echo "### Release branch"
            echo ""
            echo "- Branch: \`$branch\`"
            echo "- Pull request URL: https://github.com/${{ github.repository }}/pull/new/$branch"
            echo "- Resolve merge commit after merge: \`merge_commit=\$(gh pr list --state merged --head \"$branch\" --json mergeCommit --jq '.[0].mergeCommit.oid')\`"
            echo "- Release command after merge: \`gh release create v${VERSION} --target \"\$merge_commit\" --title \"Starweaver v${VERSION}\" --generate-notes\`"
          } >> "$GITHUB_STEP_SUMMARY"
