name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to prepare, for example 0.2.0"
        required: true
      run_full_ci:
        description: "Run make ci-all before opening the pull request"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: prepare-release-${{ github.event.inputs.version }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  prepare:
    name: Prepare release version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-llvm-cov
        if: github.event.inputs.run_full_ci == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate requested version
        run: |
          version="${{ github.event.inputs.version }}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "version $version must use X.Y.Z semver format" >&2
            exit 1
          fi

      - name: Upversion workspace
        run: make upversion VERSION=${{ github.event.inputs.version }}

      - name: Run release preparation checks
        run: |
          if [[ "${{ github.event.inputs.run_full_ci }}" == "true" ]]; then
            make ci-all
          else
            make fmt-check
            make check
            make docs-build
          fi

      - name: Create release pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.RELEASE_PR_TOKEN || github.token }}
          branch: release/v${{ github.event.inputs.version }}
          delete-branch: true
          title: Prepare release v${{ github.event.inputs.version }}
          commit-message: Prepare release v${{ github.event.inputs.version }}
          body: |
            Prepare release v${{ github.event.inputs.version }}.

            This pull request was generated by the Prepare Release workflow.

            After merging:
            1. The Draft Release workflow creates a draft GitHub Release for tag `v${{ github.event.inputs.version }}` with `starweaver-cli` binary assets.
            2. Review and publish the draft GitHub Release.
            3. Approve the `Release` environment when the release workflow reaches crates.io publishing.
          labels: release
