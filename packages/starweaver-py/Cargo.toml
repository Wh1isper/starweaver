[package]
name = "starweaver-py"
version = "0.3.0"
edition = "2024"
rust-version = "1.96"
authors = ["wh1isper"]
license = "BSD-3-Clause"
repository = "https://github.com/Wh1isper/starweaver"
homepage = "https://github.com/Wh1isper/starweaver"
description = "Python bindings for Starweaver"

[lib]
name = "starweaver_py"
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1.89"
pyo3 = { version = "0.29.0", features = ["extension-module"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
starweaver-agent = { path = "../../crates/starweaver-agent", version = "0.3.0" }
starweaver-context = { path = "../../crates/starweaver-context", version = "0.3.0" }
starweaver-core = { path = "../../crates/starweaver-core", version = "0.3.0" }
starweaver-envd = { path = "../../crates/starweaver-envd", version = "0.3.0" }
starweaver-envd-client = { path = "../../crates/starweaver-envd-client", version = "0.3.0" }
starweaver-envd-core = { path = "../../crates/starweaver-envd-core", version = "0.3.0" }
starweaver-environment = { path = "../../crates/starweaver-environment", version = "0.3.0" }
starweaver-model = { path = "../../crates/starweaver-model", version = "0.3.0" }
starweaver-oauth = { path = "../../crates/starweaver-oauth", version = "0.3.0" }
starweaver-oauth-provider = { path = "../../crates/starweaver-oauth-provider", version = "0.3.0" }
starweaver-runtime = { path = "../../crates/starweaver-runtime", version = "0.3.0" }
starweaver-session = { path = "../../crates/starweaver-session", version = "0.3.0" }
starweaver-storage = { path = "../../crates/starweaver-storage", version = "0.3.0" }
starweaver-stream = { path = "../../crates/starweaver-stream", version = "0.3.0" }
starweaver-tools = { path = "../../crates/starweaver-tools", version = "0.3.0" }
tokio = { version = "1.48.0", features = ["rt-multi-thread", "sync", "time"] }

[lints.rust]
missing_docs = "warn"
# PyO3 generates FFI glue for the extension module. Keep the exception local to
# this binding crate; core Starweaver crates inherit the workspace forbid rule.
unsafe_code = "allow"
