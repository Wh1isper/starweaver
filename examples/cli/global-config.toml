# Example global Starweaver CLI config.
# Copy to ~/.starweaver/config.toml.

[general]
default_profile = "default_model"
default_output = "agui-jsonl"
default_hitl = "defer"
model = "openai-responses:gpt-5"
model_settings = "openai_responses_high"
model_cfg = "gpt5_270k"
max_requests = 1000

[model_profiles.coding]
label = "Coding"
model = "openai-responses:gpt-5"
model_settings = "openai_responses_high"
model_cfg = "gpt5_270k"

[model_profiles.codex]
label = "Codex OAuth"
model = "oauth@codex:gpt-5"
model_settings = "openai_responses_high"
model_cfg = "gpt5_350k"

[model_profiles.gateway]
label = "Gateway OpenAI Responses"
model = "homelab@openai-responses:gpt-5"
model_settings = "openai_responses_high"
model_cfg = "gpt5_270k"

[env]
# Values here are exported into the process when the variable is absent.
# Keep raw secrets in your shell or secret manager when possible.
# STARWEAVER_IMAGE_UNDERSTANDING_MODEL = "openai-responses:gpt-5-mini"
# STARWEAVER_VIDEO_UNDERSTANDING_MODEL = "openai-responses:gpt-5-mini"

[skills]
dirs = ["~/.starweaver/skills"]
additional_dirs = []

[subagents]
dirs = ["~/.starweaver/subagents"]
additional_dirs = []
disabled = []
disabled_builtins = []

[commands.review]
description = "Review the current changes"
aliases = ["rv"]
prompt = """
Review the working tree changes for correctness, safety, and missing tests.
"""

[commands.test]
description = "Run targeted tests"
prompt = "Run tests for {{instruction}} and report failures with fixes."

[providers.openai]
enabled = true
api_key_env = "OPENAI_API_KEY"
base_url = "https://api.openai.com/v1"

[providers.codex]
base_url = "https://chatgpt.com/backend-api/codex"
max_tokens_parameter = "omit"

[oauth_refresh]
enabled = true
interval_seconds = 1800
failure_retry_seconds = 60
refresh_on_startup = true

[providers.homelab]
base_url = "https://gateway.example/v1"
max_tokens_parameter = "omit"

[providers.anthropic]
enabled = true
api_key_env = "ANTHROPIC_API_KEY"
base_url = "https://api.anthropic.com/v1"

[providers.gemini]
enabled = true
api_key_env = "GEMINI_API_KEY"
base_url = "https://generativelanguage.googleapis.com/v1beta"

[providers.google-cloud]
enabled = true
api_key_env = "GOOGLE_API_KEY"
auth_token_env = "GOOGLE_CLOUD_ACCESS_TOKEN"
base_url = "https://aiplatform.googleapis.com"

[update]
channel = "stable"

[trim]
auto_after_run = true
current_session_keep_recent_runs = 20
all_sessions_keep_days = 60
