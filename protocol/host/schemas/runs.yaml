            "$ref": "#/components/schemas/RunSummary"
          },
          "sourceRunId": {
            "$ref": "#/components/schemas/RunId"
          }
        },
        "required": [
          "run",
          "sourceRunId",
          "receipt"
        ],
        "type": "object"
      },
      "RunStartParams": {
        "additionalProperties": false,
        "properties": {
          "continuationMode": {
            "$ref": "#/components/schemas/ContinuationMode"
          },
          "environmentAttachments": {
            "items": {
              "$ref": "#/components/schemas/AttachmentId"
