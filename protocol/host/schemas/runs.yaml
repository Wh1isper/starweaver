        "required": [
          "sessionId",
          "runId"
        ],
        "type": "object"
      },
      "RunStatusResult": {
        "additionalProperties": false,
        "properties": {
          "run": {
            "$ref": "#/components/schemas/RunSummary"
          }
        },
        "required": [
          "run"
        ],
        "type": "object"
      },
      "RunSteerParams": {
        "additionalProperties": false,
        "properties": {
          "idempotencyKey": {
            "$ref": "#/components/schemas/IdempotencyKey"
          },
          "runId": {
            "$ref": "#/components/schemas/RunId"
          },
          "sessionId": {
            "$ref": "#/components/schemas/SessionId"
          },
          "text": {
            "maxLength": 16384,
            "minLength": 1,
            "type": "string"
          }
        },
        "required": [
          "sessionId",
          "runId",
          "text",
          "idempotencyKey"
        ],
        "type": "object"
      },
      "RunSteerResult": {
        "additionalProperties": false,
        "properties": {
          "accepted": {
            "type": "boolean"
          },
          "receipt": {
            "$ref": "#/components/schemas/MutationReceipt"
          }
        },
        "required": [
          "accepted",
          "receipt"
        ],
        "type": "object"
      },
      "RunSummary": {
        "additionalProperties": false,
        "properties": {
          "createdAt": {
            "$ref": "#/components/schemas/Timestamp"
