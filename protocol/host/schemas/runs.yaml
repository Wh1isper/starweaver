            "$ref": "#/components/schemas/IdempotencyKey"
          },
          "reason": {
            "oneOf": [
              {
                "maxLength": 1024,
                "minLength": 0,
                "type": "string"
              },
              {
                "type": "null"
              }
            ],
            "x-starweaver-nullable": true
          },
          "runId": {
            "$ref": "#/components/schemas/RunId"
          },
          "sessionId": {
            "$ref": "#/components/schemas/SessionId"
          }
        },
        "required": [
          "sessionId",
          "runId",
          "idempotencyKey"
        ],
        "type": "object"
      },
      "RunInterruptResult": {
        "additionalProperties": false,
        "properties": {
          "receipt": {
            "$ref": "#/components/schemas/MutationReceipt"
          },
          "run": {
            "$ref": "#/components/schemas/RunSummary"
          }
        },
        "required": [
          "run",
          "receipt"
        ],
        "type": "object"
      },
      "RunResumeParams": {
        "additionalProperties": false,
        "properties": {
          "continuationMode": {
            "$ref": "#/components/schemas/ContinuationMode"
