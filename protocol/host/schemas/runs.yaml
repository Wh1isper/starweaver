            "maxItems": 64,
            "minItems": 0,
            "type": "array",
            "uniqueItems": true
          },
          "idempotencyKey": {
            "$ref": "#/components/schemas/IdempotencyKey"
          },
          "profile": {
            "oneOf": [
              {
                "maxLength": 128,
                "minLength": 0,
                "type": "string"
              },
              {
                "type": "null"
              }
