            "maxItems": 64,
            "minItems": 0,
            "type": "array",
            "uniqueItems": true
          },
          "idempotencyKey": {
            "$ref": "#/components/schemas/IdempotencyKey"
          },
          "input": {
            "items": {
              "$ref": "#/components/schemas/InputPart"
