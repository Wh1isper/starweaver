            "x-starweaver-nullable": true
          },
          "revision": {
            "$ref": "#/components/schemas/DecimalU64"
          },
          "runId": {
            "$ref": "#/components/schemas/RunId"
          },
          "sessionId": {
            "$ref": "#/components/schemas/SessionId"
          },
          "status": {
            "$ref": "#/components/schemas/RunStatus"
          },
          "updatedAt": {
            "$ref": "#/components/schemas/Timestamp"
          }
        },
        "required": [
          "sessionId",
          "runId",
          "status",
          "revision",
          "createdAt",
          "updatedAt"
        ],
        "type": "object"
      }
