            "x-starweaver-nullable": true
          },
          "sessionId": {
            "oneOf": [
              {
                "$ref": "#/components/schemas/SessionId"
              },
              {
                "type": "null"
              }
            ],
            "x-starweaver-nullable": true
          }
        },
        "required": [
          "input",
          "idempotencyKey",
          "continuationMode",
          "environmentAttachments"
