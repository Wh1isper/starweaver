          },
          "runId": {
            "$ref": "#/components/schemas/RunId"
          },
          "sessionId": {
            "$ref": "#/components/schemas/SessionId"
          }
        },
        "required": [
          "sessionId",
          "runId",
          "idempotencyKey",
          "continuationMode",
          "environmentAttachments"
        ],
        "type": "object"
      },
      "RunResumeResult": {
        "additionalProperties": false,
        "properties": {
          "receipt": {
            "$ref": "#/components/schemas/MutationReceipt"
